# Goal: Whenever someone changes the Python code,
# the pipeline checks the syntax, formatting, and linting using Ruff.

name: Auto Linter

on:
  push:
    paths:
      - "*.py"

jobs:
  code:
    runs-on: ubuntu-latest

    steps:
      # This step checks out the repository code into the GitHub Actions runner
      - name: Checkout/Clone the code
        uses: actions/checkout@v4

      # Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install Ruff linter
      - name: Install Linter
        run: |
          pip install ruff

      # Run Ruff
      - name: Run Ruff
        run: |
          ruff check .
